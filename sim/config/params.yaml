market:
  tick_size: 1
  lot_size: 100
  initial_price: 10000
  initial_bid_size: 200
  initial_ask_size: 200
  max_steps: 200
  seed: 42

agents:
  retail:
    n_agents: 10
    arrival_rate: 10.0
    order_size_mean: 2
    direction_bias: 0.0

  institution:
    arrival_rate: 5.0
    signal_halflife: 30.0
    signal_sigma: 1.0
    threshold: 0.0
    position_limit: 500
    quote_offset_ticks: 1
    scale: 100
    signal_price_scale: 5

  equity_mm:
    arrival_rate: 20.0
    spread_target: 4
    inventory_limit: 2000
    risk_aversion: 0.1
    quote_size: 5
    max_orders_per_side: 1
